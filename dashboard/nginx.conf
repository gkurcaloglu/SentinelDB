# Non-root nginx (uid 101, imajda hazir gelen "nginx" kullanicisi) icin
# minimal statik dosya sunucusu yapilandirmasi. 8080 kullanilir cunku
# <1024 portlara (ör. 80) bind etmek root gerektirir.
worker_processes  auto;
pid                /tmp/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    server {
        listen       8080;
        listen       [::]:8080;
        server_name  _;
        root         /usr/share/nginx/html;
        index        index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
