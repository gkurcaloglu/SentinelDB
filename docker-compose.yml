# SentinelDB demo yigini: PostgreSQL -> SentinelDB gateway -> Prometheus -> Grafana,
# artı (opsiyonel ama dahil edilen) React dashboard.
#
# Kimlik bilgileri: bu dosyadaki TUM parolalar yalnizca lokal demo icindir
# (bkz. root README "Guvenlik Uyarisi" ve "Servis ve Port Tablosu").
# Gercek/production kimlik bilgisi asla buraya yazilmamalidir.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      # DEMO ONLY - production'da asla kullanilmayin.
      POSTGRES_USER: sentineldb_demo
      POSTGRES_PASSWORD: demo_only_change_me
      POSTGRES_DB: sentineldb_demo
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Gercek veritabanina yalniza demo/dogrulama amacli dogrudan erisim
      # icin: 5433 (host) -> 5432 (container). SentinelDB'nin kendisi
      # ayrica host 5432'yi kullanir (bkz. sentineldb servisi); bu yuzden
      # postgres BURADA asla host 5432'ye yayinlanmaz.
      # Duz metin PostgreSQL trafigi + demo kimlik bilgileri tasidigi icin
      # yalniza loopback'e (127.0.0.1) baglanir, tum arayuzlere degil.
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - sentineldb-net

  sentineldb:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Container icinde tum arayuzlerde dinle (localhost degil), aksi
      # halde Docker'in port yonlendirmesinden gelen trafik gateway'e hic
      # ulasmaz. Upstream'e Docker servis adiyla baglan (localhost degil).
      SENTINELDB_LISTEN_ADDR: "0.0.0.0:5432"
      SENTINELDB_TARGET_ADDR: "postgres:5432"
      SENTINELDB_METRICS_ADDR: ":9090"
      SENTINELDB_API_ADDR: ":8080"
    ports:
      # Yalniza loopback'e baglanir (bkz. postgres servisindeki not).
      - "127.0.0.1:5432:5432" # PostgreSQL gateway (Simple Query Protocol)
      - "127.0.0.1:8080:8080" # salt-okunur durum API'si (React dashboard)
      - "127.0.0.1:9090:9090" # Prometheus /metrics
    volumes:
      # config.yaml ve wasm eklentisi imaja zaten gomulu (bkz. Dockerfile);
      # burada salt-okunur olarak bind-mount edilmesi, imaji yeniden
      # derlemeden politika/maskeleme ayarlarini denemeyi kolaylastirir.
      - ./config.yaml:/app/config.yaml:ro
      - ./plugins/firewall/v2.wasm:/app/plugins/firewall/v2.wasm:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8080/api/status"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5
    networks:
      - sentineldb-net

  prometheus:
    image: prom/prometheus:v2.55.1
    depends_on:
      - sentineldb
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      # 9091 (host) -> 9090 (container, Prometheus'un kendi varsayilan
      # portu). SentinelDB'nin metrics portu (host 9090) ile catismamasi
      # icin host tarafinda kasitli olarak farkli bir port kullanilir.
      # Yalniza loopback'e baglanir (bkz. postgres servisindeki not).
      - "127.0.0.1:9091:9090"
    networks:
      - sentineldb-net

  grafana:
    image: grafana/grafana:11.3.0
    depends_on:
      - prometheus
    environment:
      # DEMO ONLY - production'da asla kullanilmayin.
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin_demo_only
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      # Yalniza loopback'e baglanir (bkz. postgres servisindeki not).
      - "127.0.0.1:3000:3000"
    networks:
      - sentineldb-net

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        # Tarayicida calisan kod HOST'tan erisir; Docker servis adi
        # (sentineldb) tarayici icin cozumlenemez.
        VITE_API_BASE_URL: "http://localhost:8080"
    depends_on:
      - sentineldb
    ports:
      # Yalniza loopback'e baglanir (bkz. postgres servisindeki not).
      - "127.0.0.1:5173:8080"
    networks:
      - sentineldb-net

volumes:
  pgdata:

networks:
  sentineldb-net:
    driver: bridge
