# SentinelDB gateway config.
# firewall.blocked_phrases: Simple Query metninde (buyuk/kucuk harf ve
# bosluk duyarsiz) gecen ifadelerden biri eslesirse sorgu, gercek
# veritabanina hic gonderilmeden engellenir.
firewall:
  blocked_phrases:
    - "DROP TABLE"
    - "DROP DATABASE"
    - "DELETE FROM"
    - "TRUNCATE"

# wasm.plugin_path: Karar mantigini calistiran, GOOS=wasip1 GOARCH=wasm ile
# derlenmis firewall eklentisinin yolu (bkz. plugins/firewall). Eklentiyi
# yeniden derlemek icin: scripts/build-wasm-plugins.ps1
wasm:
  plugin_path: "plugins/firewall/v2.wasm"

# logging.log_full_queries: varsayilan olarak KAPALI. Acilirsa, Simple
# Query mesajlarinin tam SQL metni loglara yazilir - PII/hassas veri
# icerebilecegi icin yalnizca lokal gelistirme/hata ayiklamada
# kullanilmalidir. Kapaliyken loglar yalnizca verdict, mesaj tipi, sure ve
# baglanti kimligi gibi guvenli metadata icerir.
logging:
  log_full_queries: false

# masking: yaniti donen PostgreSQL sonuclarinda hangi sutunlarin
# maskelenecegini belirler. Eslesme yalnizca RowDescription'daki sutun
# adina karsi, buyuk/kucuk harf duyarsiz TAM esleseme ile yapilir (regex
# ya da sema kesfi yoktur). Sadece burada listelenen sutunlar incelenir.
masking:
  enabled: true
  columns:
    - email

# protocol.extended_query_enabled: varsayilan olarak KAPALI (false) - bu
# durumda gateway, mevcut Simple Query yolunu (firewall.Gate.Run +
# masking.Transformer) DEGISMEDEN kullanmaya devam eder; Extended Query
# Protokolu (Parse/Bind/Describe/Execute/Close/Flush/Sync) HER ZAMAN
# oldugu gibi fail-closed reddedilir.
#
# true yapilirsa: bir baglanti, duz metin startup/authentication'i
# tamamladiktan SONRA (bkz. internal/gateway.RunStartupHandoff) Simple
# Query YERINE Extended-Query-YALNIZCA bir steady-state yoluna
# (internal/gateway.ExtendedRuntime + firewall.ExtendedFrontend) devredilir:
#   - Parse SQL metni yine Policy tarafindan degerlendirilir (Bind/Describe/
#     Execute/Close/Flush/Sync degerlendirilmez);
#   - masking.enabled=true ise DataRow hucreleri yine maskelenir (bilinmeyen
#     sonuc sekli ya da ikili hedef sutun fail-closed reddedilir);
#   - o baglantida Simple Query ('Q') artik KABUL EDILMEZ (fail-closed
#     reddedilir) - AYNI baglantida Simple/Extended Query KARISIK
#     KULLANILAMAZ;
#   - COPY protokolu ve TLS/GSS sifreleme (SSLRequest/GSSENCRequest) bu
#     modda da desteklenmez.
# Bu, operator tarafindan acikca secilen, baglanti-genelinde bir moddur -
# protokol modu arasinda otomatik/mesaj-bazli gecis YOKTUR (bkz.
# docs/design/0001-extended-query.md).
protocol:
  extended_query_enabled: false
