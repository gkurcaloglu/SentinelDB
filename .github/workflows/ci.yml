name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go-quality:
    name: Go quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: go mod verify
        run: go mod verify

      - name: gofmt check
        shell: bash
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$fmt_out"
            exit 1
          fi

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

  go-race:
    name: Go race (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # ubuntu-latest ships a C toolchain already (required for -race); no
      # additional tool installation is needed.
      - name: go test -race
        run: go test -race ./...

  dashboard:
    name: Dashboard build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: npm ci
        run: npm ci

      - name: npm run build
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: docker compose config
        run: docker compose config

      - name: docker compose build
        run: docker compose build

  e2e:
    name: End-to-end Docker demo
    runs-on: ubuntu-latest
    needs: [go-quality, dashboard, docker]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Start Compose stack
        run: docker compose up -d --build

      # Mirrors scripts/e2e-demo.ps1's own health wait, run separately here
      # per the CI job's explicit "wait for services" step requirement, and
      # so the background log capture below has something to capture from
      # the moment the stack is up.
      - name: Wait for postgres and sentineldb to be healthy
        shell: bash
        run: |
          set -e
          for svc in postgres sentineldb; do
            cid=$(docker compose ps -q "$svc")
            if [ -z "$cid" ]; then
              echo "::error::$svc container not found"
              exit 1
            fi
            waited=0
            while true; do
              status=$(docker inspect --format '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo "")
              if [ "$status" = "healthy" ]; then
                echo "$svc: healthy"
                break
              fi
              if [ "$waited" -ge 90 ]; then
                echo "::error::$svc did not become healthy in time (last status: $status)"
                exit 1
              fi
              sleep 2
              waited=$((waited + 2))
            done
          done

      # Captured continuously to a file for the whole run, since
      # scripts/e2e-demo.ps1 -Cleanup tears the stack down (docker compose
      # down) in its own finally block on both success AND failure - by the
      # time a step could run `docker compose logs` after it, the
      # containers may already be gone. This file is what "always collect
      # relevant container logs on failure" actually reads from.
      - name: Start background container log capture
        shell: bash
        run: docker compose logs -f --no-color > compose-logs.txt 2>&1 &

      # Runs the SAME script used for local Windows PowerShell 5.1 / pwsh
      # verification (see scripts/e2e-demo.ps1 and CONTRIBUTING.md);
      # ubuntu-latest ships pwsh out of the box. -Cleanup both proves
      # cleanup works in CI and shuts the stack down once the script
      # returns. The default config.yaml (logging.log_full_queries: false)
      # means gateway logs never contain SQL text, row values, or the demo
      # password - see docs/threat-model.md's sensitive logging policy.
      - name: Run E2E masking demo (cleanup enabled)
        shell: pwsh
        run: ./scripts/e2e-demo.ps1 -Cleanup

      - name: Show captured container logs on failure
        if: failure()
        shell: bash
        run: |
          echo "----- compose-logs.txt (tail) -----"
          tail -n 500 compose-logs.txt || echo "no logs captured"

      - name: Upload container logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: compose-logs
          path: compose-logs.txt
          retention-days: 7

      # Redundant with the script's own -Cleanup (docker compose down), but
      # kept as an explicit, unconditional safety net at the job level in
      # case the script step itself is killed (e.g. job timeout) before its
      # own finally block runs.
      - name: Ensure stack is shut down
        if: always()
        run: docker compose down

  driver-compat:
    name: pgx driver compatibility (PostgreSQL ${{ matrix.postgres }})
    runs-on: ubuntu-latest
    needs: [go-quality]
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        postgres: [16, 18]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Dependency-free (no Docker, no Pester), deterministic regression
      # checks for the privacy-scan/log-capture decision logic shared by
      # scripts/driver-compat.ps1 and scripts/driver-compat-ci-diagnostics.ps1
      # (both dot-source scripts/lib/driver-compat-privacy.ps1). Runs
      # first, before anything Docker-dependent, as a fast-fail gate.
      - name: pgx driver-compat privacy-scan self-test
        shell: pwsh
        run: ./scripts/driver-compat-privacy-selftest.ps1

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Runs the SAME script used for local verification
      # (scripts/driver-compat.ps1): selects the dedicated Compose project
      # (deploy/driver-compat/docker-compose.yml, project name
      # sentineldb-driver-compat - entirely separate from the root demo
      # stack/e2e job above), builds/starts it with the matrix PostgreSQL
      # image, waits for both services to report healthy, runs the real
      # pgx v5 compatibility suite (integration/pgxcompat) against it, then
      # captures gateway logs and runs its own privacy/marker scan. No
      # -Cleanup here - the stack stays up for the -race step below and
      # this job's own log-collection-on-failure steps; it is always torn
      # down in the final step regardless of outcome.
      - name: Run driver-compat stack + pgx compatibility suite
        shell: pwsh
        run: ./scripts/driver-compat.ps1 -PostgresVersion ${{ matrix.postgres }}

      # Race-detects the same real pgx suite against the same live stack,
      # on Linux, for one matrix entry - PostgreSQL 18, so both the
      # variable-length protocol-3.2 cancellation key path and the race
      # detector are exercised together. Local Windows race testing is
      # unavailable (no C compiler; see CONTRIBUTING.md) - this is the
      # source of truth. Demo-only credentials, not secrets - see
      # deploy/driver-compat/docker-compose.yml.
      - name: Run pgx compatibility suite under -race (PostgreSQL 18, stack still running)
        if: matrix.postgres == 18
        shell: bash
        working-directory: integration/pgxcompat
        env:
          SENTINELDB_DRIVER_DSN: "postgres://pgxcompat:pgxcompat_demo_only_change_me@127.0.0.1:25432/pgxcompat?sslmode=disable&application_name=pgxcompat_race_ci&connect_timeout=10"
          SENTINELDB_DIRECT_DSN: "postgres://pgxcompat:pgxcompat_demo_only_change_me@127.0.0.1:25433/pgxcompat?sslmode=disable&application_name=pgxcompat_race_ci_direct&connect_timeout=10"
          SENTINELDB_EXPECT_LONG_CANCEL_KEY: "true"
        run: go test ./... -race -count=1

      # Captures fresh (this-run) SentinelDB logs and runs the exact same
      # privacy scan scripts/driver-compat.ps1 uses - both dot-source
      # scripts/lib/driver-compat-privacy.ps1, so there is one shared
      # source of truth for the marker catalog and for the rule that a log
      # tail is only ever printed after a scan of THIS run's logs has
      # actually passed (never an old/stale file, never before scanning,
      # never a marker's actual value - only safe category labels). See
      # scripts/driver-compat-ci-diagnostics.ps1 and this job's own first
      # step (the Docker-free privacy-scan self-test) for the regression
      # proof of this exact logic.
      - name: Capture SentinelDB logs and run privacy scan on failure
        id: privacy_diag
        if: failure()
        shell: pwsh
        run: ./scripts/driver-compat-ci-diagnostics.ps1 -ProjectName sentineldb-driver-compat -ComposeFile deploy/driver-compat/docker-compose.yml

      - name: Upload privacy-scanned logs on failure
        if: failure() && steps.privacy_diag.outputs.showtail == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: driver-compat-logs-pg${{ matrix.postgres }}
          path: ${{ steps.privacy_diag.outputs.logpath }}
          retention-days: 7

      # Unconditional safety net, same rationale as the e2e job's final
      # step above - always tears down the dedicated stack and its
      # dedicated, ephemeral volume, regardless of outcome.
      - name: Ensure dedicated stack and volume are torn down
        if: always()
        shell: bash
        run: docker compose -f deploy/driver-compat/docker-compose.yml -p sentineldb-driver-compat down -v
